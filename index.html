<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>ShoeLab 3D | Artist Suite V6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/examples/jsm/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap');
        body { margin: 0; background: #121212; color: #fff; font-family: 'Roboto', sans-serif; overflow: hidden; }
        #canvas-container { width: 100vw; height: 45vh; background: #121212; position: relative; touch-action: none; }
        .ui-panel { height: 55vh; overflow-y: auto; padding: 20px; background: #1e1e1e; border-top: 1px solid #333; }
        .section-title { font-size: 11px; font-weight: 700; color: #9aa0a6; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
        .btn-action { font-weight: 900; padding: 14px; border-radius: 8px; font-size: 12px; border: none; width: 100%; transition: all 0.2s; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-paint { background: #f28b82; color: #202124; margin-bottom: 10px; }
        .btn-paint.active { border: 2px solid #fff; box-shadow: 0 0 15px rgba(242,139,130,0.4); background: #e67c73; color: white; }
        .btn-decal { background: #81c995; color: #202124; margin-bottom: 10px; }
        .btn-decal.active { border: 2px solid #fff; box-shadow: 0 0 15px rgba(129,201,149,0.4); background: #5bb974; color: white; }
        .btn-outline { border: 1px solid #5f6368; color: #8ab4f8; background: transparent; }
        input[type="color"] { -webkit-appearance: none; border: none; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 2px solid #555; border-radius: 50%; }
        input[type="range"] { width: 100%; accent-color: #8ab4f8; }
        .crosshair-cursor { cursor: crosshair !important; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div class="ui-panel">
        <div class="max-w-md mx-auto space-y-6">
            <header class="border-b border-gray-700 pb-3">
                <h1 class="text-xl font-bold text-gray-100">Artist Suite V6</h1>
                <p class="text-xs text-gray-400">Testing Branch</p>
            </header>

            <!-- Tool 4: Layer Management -->
            <section class="bg-gray-800 p-4 rounded-xl border border-gray-700">
                <div class="section-title text-purple-400">Tool 4: Layer Management</div>
                <div class="space-y-2">
                    <label class="flex items-center gap-3 bg-gray-900 p-3 rounded-lg cursor-pointer">
                        <input type="checkbox" id="layerPaint" checked class="w-4 h-4 accent-purple-500">
                        <span class="text-xs font-bold text-gray-300">SHOW PAINT CANVAS</span>
                    </label>
                    <label class="flex items-center gap-3 bg-gray-900 p-3 rounded-lg cursor-pointer">
                        <input type="checkbox" id="layerDecal" checked class="w-4 h-4 accent-purple-500">
                        <span class="text-xs font-bold text-gray-300">SHOW DECALS & LOGOS</span>
                    </label>
                    <label class="flex items-center gap-3 bg-gray-900 p-3 rounded-lg cursor-pointer">
                        <input type="checkbox" id="layerText" checked class="w-4 h-4 accent-purple-500">
                        <span class="text-xs font-bold text-gray-300">SHOW TYPOGRAPHY</span>
                    </label>
                    <button id="clearLayersBtn" class="btn-action btn-outline mt-2" style="color: #ef4444; border-color: #ef4444;">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                        CLEAR ALL LAYERS
                    </button>
                </div>
            </section>

            <!-- Tool 1: Painting -->
            <section class="bg-gray-800 p-4 rounded-xl border border-gray-700">
                <div class="section-title text-red-400">Tool 1: Direct Canvas Painting</div>
                <button id="togglePaintBtn" class="btn-action btn-paint">ACTIVATE BRUSH</button>
                <div class="flex gap-4 mt-3">
                    <div class="flex-1 bg-gray-900 p-2 rounded-lg">
                        <div class="text-[10px] font-bold text-gray-400 mb-1">COLOR</div>
                        <input type="color" id="brushColor" value="#ea4335">
                    </div>
                    <div class="flex-2 bg-gray-900 p-2 rounded-lg w-full">
                        <div class="text-[10px] font-bold text-gray-400 mb-1 flex justify-between"><span>SIZE</span><span id="brushSizeVal">10px</span></div>
                        <input type="range" id="brushSize" min="1" max="40" step="1" value="10">
                    </div>
                </div>
            </section>

            <!-- Tool 2: Decal Placement -->
            <section class="bg-gray-800 p-4 rounded-xl border border-gray-700">
                <div class="section-title text-green-400">Tool 2: Decal & Logo Placement</div>
                <button onclick="document.getElementById('decalInput').click()" class="btn-action btn-outline mb-3">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                    UPLOAD PNG LOGO
                </button>
                <input type="file" id="decalInput" class="hidden" accept="image/png, image/jpeg">
                
                <button id="toggleDecalBtn" class="btn-action btn-decal opacity-50 pointer-events-none">ACTIVATE STAMPER</button>
                <div class="bg-gray-900 p-2 rounded-lg mt-3">
                    <div class="text-[10px] font-bold text-gray-400 mb-1 flex justify-between"><span>DECAL SIZE</span><span id="decalSizeVal">2.0</span></div>
                    <input type="range" id="decalSize" min="0.5" max="5" step="0.1" value="2.0">
                </div>
            </section>

            <!-- Tool 3: Typography Engine -->
            <section class="bg-gray-800 p-4 rounded-xl border border-gray-700">
                <div class="section-title text-blue-400">Tool 3: Typography Engine</div>
                <input type="text" id="textInput" placeholder="ENTER CUSTOM TEXT..." class="w-full bg-gray-900 text-white text-xs font-bold p-3 rounded-lg mb-3 border border-gray-700 focus:outline-none focus:border-blue-400">
                <button id="toggleTextBtn" class="btn-action btn-outline" style="color: #60a5fa; border-color: #3b82f6;">ACTIVATE TEXT STAMPER</button>
                <div class="flex gap-4 mt-3">
                    <div class="flex-1 bg-gray-900 p-2 rounded-lg">
                        <div class="text-[10px] font-bold text-gray-400 mb-1">TEXT COLOR</div>
                        <input type="color" id="textColor" value="#ffffff">
                    </div>
                    <div class="flex-2 bg-gray-900 p-2 rounded-lg w-full">
                        <div class="text-[10px] font-bold text-gray-400 mb-1 flex justify-between"><span>SIZE</span><span id="textSizeVal">3.0</span></div>
                        <input type="range" id="textSize" min="1" max="10" step="0.5" value="3.0">
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';
        import { DecalGeometry } from 'three/examples/jsm/geometries/DecalGeometry.js';

        let scene, camera, renderer, shoe, controls;
        let activeMode = null; // 'paint', 'decal', 'text', or null
        let isDrawing = false;
        
        // Paint variables
        const drawCanvas = document.createElement('canvas');
        drawCanvas.width = 1024;
        drawCanvas.height = 1024;
        const ctx = drawCanvas.getContext('2d', { willReadFrequently: true });
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, 1024, 1024);
        const canvasTexture = new THREE.CanvasTexture(drawCanvas);
        canvasTexture.colorSpace = THREE.SRGBColorSpace;
        
        // Decal & Text variables
        let decalTexture = null;
        let decalMaterial = null;
        const decalMeshes = [];
        const textMeshes = [];
        const position = new THREE.Vector3();
        const orientation = new THREE.Euler();
        const size = new THREE.Vector3(10, 10, 10);
        
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / (window.innerHeight * 0.45), 0.1, 1000);
            camera.position.set(3, 1, 3);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight * 0.45);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            
            const container = document.getElementById('canvas-container');
            container.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1.2));
            const sun = new THREE.DirectionalLight(0xffffff, 1.5);
            sun.position.set(5, 10, 5);
            scene.add(sun);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            const loader = new GLTFLoader();
            loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/MaterialsVariantsShoe/glTF/MaterialsVariantsShoe.gltf', (gltf) => {
                shoe = gltf.scene;
                shoe.scale.set(10, 10, 10);
                shoe.position.y = -0.5;
                
                shoe.traverse((node) => {
                    if (node.isMesh) {
                        node.material = new THREE.MeshStandardMaterial({
                            map: canvasTexture,
                            roughness: 0.7,
                            side: THREE.DoubleSide
                        });
                    }
                });
                scene.add(shoe);
            });

            setupEvents(container);
            animate();
        }

        function paint(uv) {
            const color = document.getElementById('brushColor').value;
            const bSize = parseInt(document.getElementById('brushSize').value);
            const x = uv.x * drawCanvas.width;
            const y = (1 - uv.y) * drawCanvas.height;
            
            ctx.beginPath();
            ctx.arc(x, y, bSize, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
            canvasTexture.needsUpdate = true;
        }

        function placeDecal(intersect) {
            if (!decalMaterial || !shoe) return;
            
            position.copy(intersect.point);
            orientation.copy(shoe.rotation);
            
            const n = intersect.face.normal.clone();
            n.transformDirection(intersect.object.matrixWorld);
            n.add(intersect.point);
            
            const dummy = new THREE.Object3D();
            dummy.position.copy(position);
            dummy.lookAt(n);
            orientation.copy(dummy.rotation);
            
            const dSize = parseFloat(document.getElementById('decalSize').value);
            size.set(dSize, dSize, dSize);

            const m = new THREE.Mesh(new DecalGeometry(intersect.object, position, orientation, size), decalMaterial);
            m.renderOrder = decalMeshes.length + textMeshes.length;
            scene.add(m);
            decalMeshes.push(m);
        }

        function createTextTexture() {
            const text = document.getElementById('textInput').value || "SHOELAB";
            const color = document.getElementById('textColor').value;
            const canvas = document.createElement('canvas');
            canvas.width = 1024;
            canvas.height = 256;
            const context = canvas.getContext('2d');
            context.fillStyle = color;
            context.font = '900 140px Roboto, sans-serif';
            context.textAlign = 'center';
            context.textBaseline = 'middle';
            context.fillText(text.toUpperCase(), canvas.width / 2, canvas.height / 2);
            const tex = new THREE.CanvasTexture(canvas);
            tex.colorSpace = THREE.SRGBColorSpace;
            return tex;
        }

        function placeText(intersect) {
            if (!shoe) return;
            const tex = createTextTexture();
            const textMaterial = new THREE.MeshStandardMaterial({
                map: tex, transparent: true, depthTest: true, depthWrite: false, polygonOffset: true, polygonOffsetFactor: -4, roughness: 0.5
            });

            position.copy(intersect.point);
            orientation.copy(shoe.rotation);
            
            const n = intersect.face.normal.clone();
            n.transformDirection(intersect.object.matrixWorld);
            n.add(intersect.point);
            
            const dummy = new THREE.Object3D();
            dummy.position.copy(position);
            dummy.lookAt(n);
            orientation.copy(dummy.rotation);
            
            const tSize = parseFloat(document.getElementById('textSize').value);
            size.set(tSize, tSize / 4, tSize);

            const m = new THREE.Mesh(new DecalGeometry(intersect.object, position, orientation, size), textMaterial);
            m.renderOrder = decalMeshes.length + textMeshes.length;
            scene.add(m);
            textMeshes.push(m);
        }

        function handlePointer(e, container, isClick = false) {
            if (!activeMode || !shoe) return;
            const rect = container.getBoundingClientRect();
            let clientX, clientY;
            
            if(e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }

            mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const meshes = [];
            shoe.traverse(n => { if (n.isMesh) meshes.push(n); });
            const intersects = raycaster.intersectObjects(meshes, false);
            
            if (intersects.length > 0) {
                if (activeMode === 'paint' && intersects[0].uv) {
                    paint(intersects[0].uv);
                } else if (activeMode === 'decal' && isClick) {
                    placeDecal(intersects[0]);
                } else if (activeMode === 'text' && isClick) {
                    placeText(intersects[0]);
                }
            }
        }

        function setupEvents(container) {
            const btnPaint = document.getElementById('togglePaintBtn');
            const btnDecal = document.getElementById('toggleDecalBtn');
            const btnText = document.getElementById('toggleTextBtn');

            function resetButtons() {
                btnPaint.className = "btn-action btn-paint";
                btnPaint.innerText = "ACTIVATE BRUSH";
                if (decalTexture) {
                    btnDecal.className = "btn-action btn-decal";
                    btnDecal.innerText = "ACTIVATE STAMPER";
                } else {
                    btnDecal.className = "btn-action btn-decal opacity-50 pointer-events-none";
                }
                btnText.className = "btn-action btn-outline";
                btnText.style.background = "transparent";
                btnText.style.color = "#60a5fa";
                btnText.innerText = "ACTIVATE TEXT STAMPER";
            }

            btnPaint.onclick = () => {
                activeMode = activeMode === 'paint' ? null : 'paint';
                controls.enabled = activeMode === null;
                resetButtons();
                if (activeMode === 'paint') {
                    btnPaint.className = "btn-action btn-paint active";
                    btnPaint.innerText = "BRUSH ACTIVE (DRAW ON SHOE)";
                }
                container.className = activeMode !== null ? "crosshair-cursor" : "";
            };

            btnDecal.onclick = () => {
                if (!decalTexture) return;
                activeMode = activeMode === 'decal' ? null : 'decal';
                controls.enabled = activeMode === null;
                resetButtons();
                if (activeMode === 'decal') {
                    btnDecal.className = "btn-action btn-decal active";
                    btnDecal.innerText = "STAMPER ACTIVE (TAP SHOE)";
                }
                container.className = activeMode !== null ? "crosshair-cursor" : "";
            };

            btnText.onclick = () => {
                activeMode = activeMode === 'text' ? null : 'text';
                controls.enabled = activeMode === null;
                resetButtons();
                if (activeMode === 'text') {
                    btnText.className = "btn-action active";
                    btnText.style.background = "#3b82f6";
                    btnText.style.color = "#fff";
                    btnText.style.borderColor = "#fff";
                    btnText.style.boxShadow = "0 0 15px rgba(96,165,250,0.4)";
                    btnText.innerText = "TEXT STAMPER ACTIVE (TAP SHOE)";
                }
                container.className = activeMode !== null ? "crosshair-cursor" : "";
            };

            // Layer Management Tools
            document.getElementById('layerPaint').onchange = (e) => {
                shoe.traverse((node) => {
                    if (node.isMesh) {
                        node.material.map = e.target.checked ? canvasTexture : null;
                        node.material.needsUpdate = true;
                    }
                });
            };
            document.getElementById('layerDecal').onchange = (e) => decalMeshes.forEach(m => m.visible = e.target.checked);
            document.getElementById('layerText').onchange = (e) => textMeshes.forEach(m => m.visible = e.target.checked);
            document.getElementById('clearLayersBtn').onclick = () => {
                ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, 1024, 1024); canvasTexture.needsUpdate = true;
                decalMeshes.forEach(m => scene.remove(m)); decalMeshes.length = 0;
                textMeshes.forEach(m => scene.remove(m)); textMeshes.length = 0;
            };

            // Decal Upload
            document.getElementById('decalInput').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        new THREE.TextureLoader().load(ev.target.result, (tex) => {
                            tex.colorSpace = THREE.SRGBColorSpace;
                            decalTexture = tex;
                            decalMaterial = new THREE.MeshStandardMaterial({
                                map: decalTexture, transparent: true, depthTest: true, depthWrite: false, polygonOffset: true, polygonOffsetFactor: -4, roughness: 0.5
                            });
                            btnDecal.classList.remove('opacity-50', 'pointer-events-none');
                            btnDecal.innerText = "ACTIVATE STAMPER";
                        });
                    };
                    reader.readAsDataURL(file);
                }
            });

            document.getElementById('brushSize').oninput = (e) => document.getElementById('brushSizeVal').innerText = e.target.value + 'px';
            document.getElementById('decalSize').oninput = (e) => document.getElementById('decalSizeVal').innerText = e.target.value;
            document.getElementById('textSize').oninput = (e) => document.getElementById('textSizeVal').innerText = e.target.value;

            // Pointer events
            container.addEventListener('pointerdown', (e) => {
                if(activeMode === 'paint') { isDrawing = true; handlePointer(e, container); }
                if(activeMode === 'decal' || activeMode === 'text') { handlePointer(e, container, true); }
            });
            container.addEventListener('pointermove', (e) => {
                if(isDrawing && activeMode === 'paint') handlePointer(e, container);
            });
            window.addEventListener('pointerup', () => { isDrawing = false; });
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / (window.innerHeight * 0.45);
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight * 0.45);
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls.enabled) controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
