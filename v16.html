<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ShoeLab V16</title><style>body{margin:0;background:#050707;color:white;font-family:Arial,sans-serif;overflow:hidden}#app{height:100vh;display:grid;grid-template-rows:72vh 28vh}.stage{position:relative;background:radial-gradient(circle at 50% 20%,#17342f,#050707 70%)}.hud{position:absolute;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;z-index:3}.glass{background:#ffffff18;border:1px solid #ffffff33;border-radius:20px;padding:10px;backdrop-filter:blur(16px);box-shadow:0 18px 50px #000}.title{font-weight:900;font-size:28px}.sub{font-weight:900;font-size:12px;color:#86efac}.views{display:flex;gap:6px;flex-wrap:wrap}.btn{border:1px solid #ffffff33;background:#ffffff18;color:white;border-radius:14px;padding:9px 12px;font-weight:900}.btn.on{background:white;color:#06110e}.blue{background:#60a5fa;color:#06110e}.green{background:#34d399;color:#06110e}.gold{background:#fbbf24;color:#111}.red{background:#7f1d1d;color:#fee2e2}.shoeWrap{position:absolute;inset:58px 20px 10px;display:grid;place-items:center}.shoe{width:min(92vw,1100px);height:auto;filter:drop-shadow(0 35px 26px #000)}.zone{cursor:pointer;transition:.15s}.zone:hover,.zone.sel{stroke:#67e8f9!important;stroke-width:8!important;filter:drop-shadow(0 0 10px #67e8f9)}#panel{overflow:auto;background:linear-gradient(#ffffff14,#ffffff08);border-top:1px solid #ffffff2b;padding:10px 12px 30px}.bar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:1100px;margin:auto auto 8px}.card{max-width:1100px;margin:0 auto 8px;background:#ffffff18;border:1px solid #ffffff2e;border-radius:18px;padding:10px}.zones{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}.tools{display:grid;grid-template-columns:repeat(6,1fr);gap:7px}.hint{font-size:12px;color:#cbd5e1}.small{font-size:11px}@media(max-width:700px){#app{grid-template-rows:62vh 38vh}.bar,.zones,.tools{grid-template-columns:1fr 1fr}.title{font-size:22px}}</style></head><body><div id="app"><div class="stage"><div class="hud"><div class="glass"><div class="small" style="letter-spacing:.18em;font-weight:900;color:#c7fff0">SHOELAB 3D PRO</div><div class="title">Designer V16</div><div id="status" class="sub">Real blank sneaker canvas</div></div><div class="glass views"><button class="btn on" onclick="setView('side')">SIDE</button><button class="btn" onclick="setView('top')">TOP</button><button class="btn" onclick="setView('front')">FRONT</button><button class="btn" onclick="setView('back')">BACK</button><button class="btn" onclick="setView('sole')">SOLE</button></div></div><div class="shoeWrap"><svg id="svg" class="shoe" viewBox="0 0 1200 560"></svg></div></div><div id="panel"><div class="bar"><button class="btn gold">LOCKED DESIGN</button><button class="btn blue">BRUSH</button><button class="btn green">+ LAYER</button><button class="btn blue" onclick="exportPNG()">EXPORT PNG</button></div><div class="card"><b>Real blank sneaker template</b><p class="hint">This replaces the goofy fake shoe with a clean professional blank sneaker surface. Click a zone, then use this as the base for the next build.</p></div><div class="card"><b>Design zones</b><div class="zones" id="zoneBtns"></div><p class="hint">Active zone: <span id="activeZone">FULL</span></p></div><div class="card"><b>Paint-style tools placeholder</b><div class="tools"><button class="btn">SELECT</button><button class="btn">PENCIL</button><button class="btn">BRUSH</button><button class="btn">FILL</button><button class="btn">ERASER</button><button class="btn">TEXT</button><button class="btn">LOGO</button><button class="btn">LINE</button><button class="btn">RECT</button><button class="btn">CIRCLE</button><button class="btn">ARROW</button><button class="btn">STAR</button></div></div></div></div><script>const zones=['FULL','TOE BOX','MUDGUARD','QUARTER','HEEL','TONGUE','COLLAR','LACES','MIDSOLE','OUTSOLE','LOGO'];let active='FULL';function zbtns(){zoneBtns.innerHTML=zones.map(z=>`<button class="btn ${z==active?'on':''}" onclick="pick('${z}')">${z}</button>`).join('')}function pick(z){active=z;activeZone.textContent=z;zbtns();document.querySelectorAll('.zone').forEach(e=>e.classList.remove('sel'));let id=z.toLowerCase().replaceAll(' ','_');let el=document.getElementById(id);if(el)el.classList.add('sel');status.textContent=z+' selected'}function setView(v){document.querySelectorAll('.views .btn').forEach(b=>b.classList.remove('on'));event.target.classList.add('on');draw(v)}function draw(v='side'){let s='';if(v==='side')s=`<ellipse cx="605" cy="485" rx="505" ry="42" fill="#000" opacity=".45"/><path id="outsole" class="zone" d="M145 392 C390 440 860 438 1085 375 L1125 430 C825 508 345 505 115 430 Z" fill="#111827" stroke="#202a35" stroke-width="4"/><path id="midsole" class="zone" d="M135 330 C420 382 835 380 1070 318 L1120 374 C845 435 365 438 125 390 Z" fill="#e5e7eb" stroke="#94a3b8" stroke-width="4"/><path id="mudguard" class="zone" d="M135 302 C180 155 310 92 455 82 C610 72 745 135 845 187 C940 236 1040 245 1090 302 C1040 340 795 348 560 340 C330 335 185 325 135 302 Z" fill="#f8fafc" stroke="#26313a" stroke-width="5"/><path id="quarter" class="zone" d="M470 100 C600 64 735 120 850 188 C765 238 620 248 505 214 C465 178 455 135 470 100 Z" fill="#f1f5f9" stroke="#94a3b8" stroke-width="4"/><path id="toe_box" class="zone" d="M840 190 C955 210 1055 238 1110 296 C1080 335 955 342 810 326 C765 278 782 222 840 190 Z" fill="#fff" stroke="#94a3b8" stroke-width="4"/><path id="heel" class="zone" d="M145 300 C165 170 260 100 405 88 C370 168 358 242 372 324 C280 330 190 322 145 300 Z" fill="#f8fafc" stroke="#26313a" stroke-width="5"/><ellipse id="collar" class="zone" cx="300" cy="185" rx="125" ry="75" fill="#111827" stroke="#26313a" stroke-width="4"/><path id="tongue" class="zone" d="M430 132 L620 162 L580 265 L390 238 Z" fill="#eef2f7" stroke="#94a3b8" stroke-width="4"/><g id="laces" class="zone" stroke="#111827" stroke-width="10"><line x1="430" y1="150" x2="610" y2="190"/><line x1="418" y1="176" x2="600" y2="214"/><line x1="405" y1="202" x2="590" y2="238"/></g><path id="logo" class="zone" d="M640 225 C745 165 850 175 955 225 C825 210 745 240 640 225 Z" fill="none" stroke="#111827" stroke-width="10"/>`;else if(v==='sole')s=`<path id="outsole" class="zone" d="M165 280 C215 75 455 32 690 58 C945 88 1110 180 1060 340 C1010 505 675 525 390 475 C225 445 120 385 165 280 Z" fill="#1f2937" stroke="#64748b" stroke-width="6"/><g fill="#374151">${Array.from({length:34},(_,i)=>`<circle cx="${360+(i%11)*58}" cy="${150+Math.floor(i/11)*95}" r="22"/>`).join('')}</g><rect id="logo" class="zone" x="390" y="260" width="430" height="45" fill="#94a3b8"/>`;else s=`<ellipse cx="600" cy="465" rx="300" ry="38" fill="#000" opacity=".45"/><path id="toe_box" class="zone" d="M350 365 C380 110 520 60 600 50 C680 60 820 110 850 365 C750 430 450 430 350 365 Z" fill="#f8fafc" stroke="#26313a" stroke-width="6"/><rect id="tongue" class="zone" x="520" y="155" width="160" height="205" fill="#111827"/><path id="midsole" class="zone" d="M300 365 C450 430 750 430 900 365 L890 430 C720 500 480 500 310 430 Z" fill="#e5e7eb"/><rect id="outsole" class="zone" x="300" y="430" width="600" height="55" fill="#111827"/>`;svg.innerHTML=s;pick(active)}function exportPNG(){let a=document.createElement('a');a.href='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg.outerHTML);a.download='shoelab_blank_sneaker.svg';a.click()}zbtns();draw('side');</script></body></html>
