<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>ShoeLab 3D | Material Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/examples/jsm/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap');
        body { margin: 0; background: #121212; color: #fff; font-family: 'Roboto', sans-serif; overflow: hidden; }
        #canvas-container { width: 100vw; height: 45vh; background: #121212; position: relative; }
        .ui-panel { height: 55vh; overflow-y: auto; padding: 20px; background: #1e1e1e; border-top: 1px solid #333; }
        .section-title { font-size: 11px; font-weight: 700; color: #9aa0a6; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
        .btn-google { background: #8ab4f8; color: #202124; font-weight: 700; padding: 12px; border-radius: 8px; transition: opacity 0.2s; font-size: 13px; border: none; }
        .btn-google:active { opacity: 0.8; }
        .btn-outline { border: 1px solid #5f6368; color: #8ab4f8; padding: 12px; border-radius: 8px; font-weight: 700; font-size: 13px; background: transparent; }
        .color-swatch { width: 36px; height: 36px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.1s; }
        .color-swatch:active { transform: scale(0.9); }
        input[type=range] { width: 100%; accent-color: #8ab4f8; background: #3c4043; height: 4px; border-radius: 2px; appearance: none; margin-top: 8px; }
        input[type=range]::-webkit-slider-thumb { appearance: none; width: 16px; height: 16px; background: #8ab4f8; border-radius: 50%; }
        input[type="color"] { -webkit-appearance: none; border: none; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 50%; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div class="ui-panel">
        <div class="max-w-md mx-auto space-y-6">
            <header class="border-b border-gray-700 pb-3">
                <h1 class="text-xl font-bold text-gray-100">Material Studio Pro</h1>
                <p class="text-xs text-gray-400">V5.0 - Custom 3D & Advanced Color</p>
            </header>

            <!-- 1. Model Base -->
            <section class="bg-gray-800 p-4 rounded-xl">
                <div class="section-title">1. Base Shoe Model</div>
                <p class="text-[11px] text-gray-400 mb-3">Upload your own .GLB or .GLTF 3D shoe file.</p>
                <div class="flex gap-2">
                    <button onclick="document.getElementById('meshInput').click()" class="btn-outline flex-1">IMPORT 3D MODEL (.GLB)</button>
                    <input type="file" id="meshInput" class="hidden" accept=".glb,.gltf">
                </div>
            </section>

            <!-- 2. Art Mapping -->
            <section class="bg-gray-800 p-4 rounded-xl">
                <div class="section-title">2. Canvas Art Mapping</div>
                <button onclick="document.getElementById('fileInput').click()" class="btn-google w-full mb-4">UPLOAD & WRAP 2D IMAGE</button>
                <input type="file" id="fileInput" class="hidden" accept="image/*">
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <div class="flex justify-between text-[10px] text-gray-300"><span>Scale</span><span id="scaleVal">1.0</span></div>
                        <input type="range" id="tScale" min="0.1" max="5" step="0.1" value="1">
                    </div>
                    <div>
                        <div class="flex justify-between text-[10px] text-gray-300"><span>Rotate</span><span id="rotVal">0°</span></div>
                        <input type="range" id="tRot" min="0" max="360" step="1" value="0">
                    </div>
                </div>
            </section>

            <!-- 3. Google Material Palette -->
            <section class="bg-gray-800 p-4 rounded-xl">
                <div class="section-title flex justify-between items-center">
                    <span>3. Material Design Palette</span>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <span class="text-[10px] text-blue-300 font-bold">CUSTOM HEX</span>
                        <input type="color" id="nativeColorPicker" value="#8ab4f8">
                    </label>
                </div>
                <div class="grid grid-cols-7 gap-2 mb-4" id="google-palette"></div>
                
                <div class="space-y-3 pt-2 border-t border-gray-700">
                    <div>
                        <div class="flex justify-between text-[10px] text-gray-300"><span>Material Roughness (Matte vs Glossy)</span></div>
                        <input type="range" id="mRough" min="0" max="1" step="0.05" value="0.5">
                    </div>
                    <div>
                        <div class="flex justify-between text-[10px] text-gray-300"><span>Metalness (Fabric vs Metallic)</span></div>
                        <input type="range" id="mMetal" min="0" max="1" step="0.05" value="0.1">
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';

        let scene, camera, renderer, shoe, texture;
        
        // Official Google Material Design 500-level Colors
        const materialColors = [
            '#ffffff', '#202124', '#ea4335', '#fbbc04', '#34a853', '#4285f4', '#673ab7',
            '#e91e63', '#9c27b0', '#3f51b5', '#03a9f4', '#00bcd4', '#009688', '#8bc34a',
            '#cddc39', '#ffeb3b', '#ffc107', '#ff9800', '#ff5722', '#795548', '#9e9e9e'
        ];

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / (window.innerHeight * 0.45), 0.1, 1000);
            camera.position.set(3, 1, 3);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight * 0.45);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1.0));
            const sun = new THREE.DirectionalLight(0xffffff, 1.5);
            sun.position.set(5, 10, 5);
            scene.add(sun);

            loadBaseModel('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/MaterialsVariantsShoe/glTF/MaterialsVariantsShoe.gltf', true);

            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.minDistance = 0.5;
            controls.maxDistance = 10;

            setupEvents();
            buildPalette();
            animate();
        }

        function loadBaseModel(url, isDefault = false) {
            if (shoe) scene.remove(shoe);
            const loader = new GLTFLoader();
            loader.load(url, (gltf) => {
                shoe = gltf.scene;
                if(isDefault) {
                    shoe.scale.set(10, 10, 10);
                    shoe.position.y = -0.5;
                } else {
                    // Center and scale custom model
                    const box = new THREE.Box3().setFromObject(shoe);
                    const size = box.getSize(new THREE.Vector3()).length();
                    const center = box.getCenter(new THREE.Vector3());
                    shoe.position.x += (shoe.position.x - center.x);
                    shoe.position.y += (shoe.position.y - center.y);
                    shoe.position.z += (shoe.position.z - center.z);
                    const targetSize = 2.0;
                    shoe.scale.setScalar(targetSize / size);
                }
                
                // Ensure materials are ready for editing
                shoe.traverse((node) => {
                    if (node.isMesh) {
                        node.material = new THREE.MeshStandardMaterial({
                            color: node.material.color || 0xffffff,
                            roughness: 0.5,
                            metalness: 0.1,
                            side: THREE.DoubleSide
                        });
                        if (texture) node.material.map = texture;
                    }
                });
                scene.add(shoe);
            });
        }

        function setupEvents() {
            // 3D Model Upload
            document.getElementById('meshInput').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const url = URL.createObjectURL(file);
                    loadBaseModel(url);
                }
            });

            // 2D Image Upload
            document.getElementById('fileInput').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        new THREE.TextureLoader().load(ev.target.result, (tex) => {
                            tex.colorSpace = THREE.SRGBColorSpace;
                            tex.flipY = false;
                            tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
                            texture = tex;
                            applyTexture();
                        });
                    };
                    reader.readAsDataURL(file);
                }
            });

            // Sliders
            document.getElementById('tScale').oninput = (e) => {
                document.getElementById('scaleVal').innerText = e.target.value;
                if(texture) texture.repeat.set(e.target.value, e.target.value);
            };
            document.getElementById('tRot').oninput = (e) => {
                document.getElementById('rotVal').innerText = e.target.value + '°';
                if(texture) texture.rotation = (e.target.value * Math.PI) / 180;
            };
            document.getElementById('mRough').oninput = (e) => {
                if(shoe) shoe.traverse(n => { if(n.isMesh) n.material.roughness = e.target.value; });
            };
            document.getElementById('mMetal').oninput = (e) => {
                if(shoe) shoe.traverse(n => { if(n.isMesh) n.material.metalness = e.target.value; });
            };

            // Custom Color Picker
            document.getElementById('nativeColorPicker').addEventListener('input', (e) => {
                applyColor(e.target.value);
            });
        }

        function applyTexture() {
            if(!shoe || !texture) return;
            shoe.traverse(n => {
                if(n.isMesh) {
                    n.material.map = texture;
                    n.material.color.setHex(0xffffff);
                    n.material.needsUpdate = true;
                }
            });
        }

        function applyColor(hex) {
            if(!shoe) return;
            shoe.traverse(n => {
                if(n.isMesh) {
                    n.material.color.set(hex);
                    n.material.map = null; // Clear image to show pure color
                    n.material.needsUpdate = true;
                }
            });
        }

        function buildPalette() {
            const container = document.getElementById('google-palette');
            materialColors.forEach(hex => {
                const btn = document.createElement('div');
                btn.className = 'color-swatch';
                btn.style.backgroundColor = hex;
                if(hex === '#ffffff') btn.style.border = '1px solid #ccc';
                btn.onclick = () => {
                    applyColor(hex);
                    document.getElementById('nativeColorPicker').value = hex;
                };
                container.appendChild(btn);
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            if(shoe) shoe.rotation.y += 0.002;
            renderer.render(scene, camera);
        }

        init();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / (window.innerHeight * 0.45);
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight * 0.45);
        });
    </script>
</body>
</html>
