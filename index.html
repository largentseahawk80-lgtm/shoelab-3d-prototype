<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#050505">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ShoeLab 3D Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/examples/jsm/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: system-ui, sans-serif; overflow: hidden; }
        #canvas-container { width: 100vw; height: 60vh; background: radial-gradient(circle at top, #333, #050505); }
        .ui-panel { height: 40vh; overflow-y: auto; padding: 20px; background: #111; border-top: 1px solid #333; }
        .color-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 10px; }
        .color-btn { width: 100%; height: 40px; border-radius: 8px; border: 2px solid transparent; }
        .color-btn.active { border-color: white; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="ui-panel">
        <h2 class="text-xl font-bold mb-4">ShoeLab Pro Designer</h2>
        <div class="mb-6">
            <p class="text-sm text-gray-400 mb-2">Select Component</p>
            <div class="flex gap-2">
                <button onclick="setPart('upper')" id="btn-upper" class="bg-white text-black px-4 py-2 rounded-full text-sm font-bold">Upper</button>
                <button onclick="setPart('sole')" id="btn-sole" class="bg-gray-800 text-white px-4 py-2 rounded-full text-sm">Sole</button>
                <button onclick="setPart('laces')" id="btn-laces" class="bg-gray-800 text-white px-4 py-2 rounded-full text-sm">Laces</button>
            </div>
        </div>
        <div>
            <p class="text-sm text-gray-400 mb-2">Color Palette</p>
            <div class="color-grid" id="color-palette"></div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';

        let scene, camera, renderer, shoe, currentPart = 'upper';
        const colors = ['#ffffff', '#1a1a1a', '#ff3b30', '#007aff', '#4cd964', '#ffcc00', '#5856d6', '#ff9500'];
        const parts = {
            upper: { color: '#ffffff' },
            sole: { color: '#1a1a1a' },
            laces: { color: '#ffffff' }
        };

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / (window.innerHeight * 0.6), 0.1, 1000);
            camera.position.set(4, 2, 4);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight * 0.6);
            renderer.setPixelRatio(window.devicePixelRatio);
            // Updated for Three.js r160+ (SRGBColorSpace replaces sRGBEncoding)
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(5, 5, 5);
            scene.add(dirLight);

            const geometry = new THREE.CapsuleGeometry(0.8, 1.5, 4, 8);
            geometry.rotateZ(Math.PI / 2);
            const material = new THREE.MeshStandardMaterial({ color: 0xffffff });
            shoe = new THREE.Mesh(geometry, material);
            scene.add(shoe);

            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            window.addEventListener('resize', onWindowResize);
            createPalette();
            animate();
        }

        function createPalette() {
            const palette = document.getElementById('color-palette');
            colors.forEach(color => {
                const btn = document.createElement('button');
                btn.className = 'color-btn';
                btn.style.backgroundColor = color;
                btn.onclick = () => {
                    parts[currentPart].color = color;
                    shoe.material.color.set(color);
                };
                palette.appendChild(btn);
            });
        }

        window.setPart = (part) => {
            currentPart = part;
            ['upper', 'sole', 'laces'].forEach(p => {
                const btn = document.getElementById('btn-' + p);
                btn.className = p === part ? 'bg-white text-black px-4 py-2 rounded-full text-sm font-bold' : 'bg-gray-800 text-white px-4 py-2 rounded-full text-sm';
            });
            shoe.material.color.set(parts[part].color);
        };

        function onWindowResize() {
            camera.aspect = window.innerWidth / (window.innerHeight * 0.6);
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight * 0.6);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (shoe) shoe.rotation.y += 0.005;
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
