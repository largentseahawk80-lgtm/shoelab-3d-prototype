<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShoeLab V19: Pro Stencil Studio</title>
    <style>
        :root { --bg: #121212; --panel: #1e1e1e; --accent: #007aff; --text: #e0e0e0; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; display: flex; height: 100vh; }
        #app { display: flex; flex: 1; flex-direction: column; position: relative; }
        #main-view { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; background: radial-gradient(circle, #2c2c2c 0%, #121212 100%); }
        canvas { position: absolute; max-width: 90%; max-height: 80%; cursor: crosshair; }
        #ui-layer { position: absolute; inset: 0; pointer-events: none; display: flex; flex-direction: column; }
        
        /* Design Dock */
        #design-dock { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--panel); padding: 10px 20px; border-radius: 40px; display: flex; gap: 15px; pointer-events: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; }
        .tool-btn { background: none; border: none; color: #888; padding: 10px; cursor: pointer; transition: 0.2s; border-radius: 50%; }
        .tool-btn:hover, .tool-btn.active { color: var(--accent); background: rgba(255,255,255,0.05); }
        .tool-btn svg { width: 24px; height: 24px; }

        /* Layer Stack */
        #layer-stack { position: absolute; right: 20px; top: 20px; bottom: 100px; width: 220px; background: var(--panel); border-radius: 12px; pointer-events: auto; border: 1px solid #333; display: flex; flex-direction: column; }
        .panel-header { padding: 15px; font-weight: bold; border-bottom: 1px solid #333; font-size: 0.9em; text-transform: uppercase; letter-spacing: 1px; }
        #layers-list { flex: 1; overflow-y: auto; padding: 10px; }
        .layer-item { display: flex; align-items: center; gap: 10px; padding: 10px; background: #252525; border-radius: 6px; margin-bottom: 8px; font-size: 0.85em; }
        .layer-toggle { cursor: pointer; color: var(--accent); }

        /* Controls */
        #top-bar { position: absolute; top: 20px; left: 20px; display: flex; gap: 10px; pointer-events: auto; }
        .action-btn { background: var(--panel); border: 1px solid #333; color: var(--text); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.85em; }
        .action-btn:hover { background: #252525; }

        /* Zones */
        #zone-selector { position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; pointer-events: auto; }
        .zone-btn { background: rgba(0,0,0,0.6); border: 1px solid #444; color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 0.7em; cursor: pointer; }
        .zone-btn.active { border-color: var(--accent); color: var(--accent); }
        
        #file-input { display: none; }
    </style>
</head>
<body>
    <div id="app">
        <div id="top-bar">
            <button class="action-btn" onclick="document.getElementById('file-input').click()">Import Stencil</button>
            <button class="action-btn" onclick="saveProject()">Save</button>
            <button class="action-btn" onclick="exportPNG()">Export PNG</button>
            <input type="file" id="file-input" accept="image/*">
        </div>

        <div id="main-view">
            <canvas id="baseCanvas"></canvas>
            <canvas id="stencilCanvas"></canvas>
            <canvas id="paintCanvas"></canvas>
        </div>

        <div id="zone-selector">
            <button class="zone-btn active" onclick="setZone('All')">Full Shoe</button>
            <button class="zone-btn" onclick="setZone('Toe')">Toe Box</button>
            <button class="zone-btn" onclick="setZone('Heel')">Heel</button>
            <button class="zone-btn" onclick="setZone('Sole')">Sole</button>
        </div>

        <div id="design-dock">
            <button class="tool-btn active" id="btn-brush" onclick="setTool('brush')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13l-6 6-6-6M12 19V5"/></svg>
            </button>
            <button class="tool-btn" id="btn-eraser" onclick="setTool('eraser')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 20H7L3 16C2 15 2 13 3 12L13 2L22 11L20 20Z"/><path d="M17 17L7 7"/></svg>
            </button>
            <button class="tool-btn" id="btn-fill" onclick="setTool('fill')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 12h10v10l10-10H12V2z"/></svg>
            </button>
        </div>

        <div id="layer-stack">
            <div class="panel-header">Layer Stack</div>
            <div id="layers-list">
                <div class="layer-item"><span class="layer-toggle" onclick="toggleLayer('paint')">👁</span> Design Layer</div>
                <div class="layer-item"><span class="layer-toggle" onclick="toggleLayer('stencil')">👁</span> Stencil Engine</div>
                <div class="layer-item"><span class="layer-toggle" onclick="toggleLayer('base')">👁</span> Sneaker Base</div>
            </div>
        </div>
    </div>

    <script>
        const baseCanvas = document.getElementById('baseCanvas');
        const stencilCanvas = document.getElementById('stencilCanvas');
        const paintCanvas = document.getElementById('paintCanvas');
        const ctxs = { base: baseCanvas.getContext('2d'), stencil: stencilCanvas.getContext('2d'), paint: paintCanvas.getContext('2d') };
        
        let tool = 'brush';
        let currentZone = 'All';
        let isDrawing = false;

        const zones = {
            Toe: [[100, 300], [250, 300], [250, 450], [100, 450]],
            Heel: [[550, 200], [750, 200], [750, 500], [550, 500]],
            Sole: [[100, 450], [750, 450], [750, 550], [100, 550]]
        };

        function init() {
            [baseCanvas, stencilCanvas, paintCanvas].forEach(c => {
                c.width = 800; c.height = 600;
            });
            drawSneakerBase();
        }

        function drawSneakerBase() {
            const ctx = ctxs.base;
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(100, 450); ctx.lineTo(750, 450); ctx.lineTo(750, 200);
            ctx.bezierCurveTo(750, 150, 600, 150, 550, 200);
            ctx.lineTo(250, 300);
            ctx.bezierCurveTo(150, 300, 100, 350, 100, 450);
            ctx.stroke();
            // Simple Sole
            ctx.strokeRect(100, 450, 650, 50);
        }

        function setTool(t) {
            tool = t;
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + t).classList.add('active');
        }

        function setZone(z) {
            currentZone = z;
            document.querySelectorAll('.zone-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }

        function toggleLayer(l) {
            const c = document.getElementById(l + 'Canvas');
            c.style.display = (c.style.display === 'none') ? 'block' : 'none';
        }

        document.getElementById('file-input').onchange = function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    processStencil(img);
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(e.target.files[0]);
        };

        function processStencil(img) {
            const tempCanvas = document.createElement('canvas');
            const tctx = tempCanvas.getContext('2d');
            tempCanvas.width = 800; tempCanvas.height = 600;
            tctx.drawImage(img, 0, 0, 800, 600);
            const imageData = tctx.getImageData(0, 0, 800, 600);
            const data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                const avg = (data[i] + data[i+1] + data[i+2]) / 3;
                const val = avg > 128 ? 255 : 0; // High contrast
                data[i] = data[i+1] = data[i+2] = 255;
                data[i+3] = val === 0 ? 255 : 0; // Transparent white stencil
            }
            ctxs.stencil.putImageData(imageData, 0, 0);
        }

        paintCanvas.onmousedown = (e) => { isDrawing = true; paint(e); };
        paintCanvas.onmousemove = (e) => { if(isDrawing) paint(e); };
        window.onmouseup = () => isDrawing = false;

        function paint(e) {
            const rect = paintCanvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const ctx = ctxs.paint;
            
            ctx.globalCompositeOperation = tool === 'eraser' ? 'destination-out' : 'source-over';
            ctx.fillStyle = tool === 'brush' ? '#007aff' : 'rgba(0,0,0,1)';
            
            ctx.beginPath();
            ctx.arc(x, y, 10, 0, Math.PI * 2);
            ctx.fill();
        }

        function exportPNG() {
            const finalCanvas = document.createElement('canvas');
            finalCanvas.width = 800; finalCanvas.height = 600;
            const fctx = finalCanvas.getContext('2d');
            fctx.drawImage(baseCanvas, 0, 0);
            fctx.drawImage(stencilCanvas, 0, 0);
            fctx.drawImage(paintCanvas, 0, 0);
            const link = document.createElement('a');
            link.download = 'shoelab-design.png';
            link.href = finalCanvas.toDataURL();
            link.click();
        }

        function saveProject() { alert('Design Saved to Local Storage (v19)'); }

        init();
    </script>
</body>
</html>
