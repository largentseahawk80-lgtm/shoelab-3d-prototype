<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#050505" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ShoeLab 3D" />
  <title>ShoeLab 3D Pro</title>
  <style>
    *{box-sizing:border-box} html,body,#root{margin:0;min-height:100%;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#050505;color:#fff} button,input,select{font:inherit}.app{min-height:100dvh;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);background:#050505}.top{position:sticky;top:0;z-index:10;display:flex;justify-content:space-between;gap:10px;align-items:center;padding:14px;border-bottom:1px solid #ffffff18;background:#050505e8;backdrop-filter:blur(14px)}h1{font-size:24px;margin:0;font-weight:900;letter-spacing:-.04em}.sub{font-size:12px;color:#aaa;margin-top:3px}.pill{border:1px solid #facc1538;background:#facc1518;color:#fde68a;border-radius:999px;padding:8px 10px;font-size:12px;max-width:170px}.grid{display:grid;grid-template-columns:320px minmax(340px,1fr) 350px;min-height:calc(100dvh - 67px)}.panel{background:#0b0b0d;padding:14px;border-color:#ffffff18;overflow:auto}.left{border-right:1px solid #ffffff18}.right{border-left:1px solid #ffffff18}.card{border:1px solid #ffffff18;background:#ffffff0a;border-radius:24px;padding:14px;margin-bottom:14px;box-shadow:0 20px 60px #0008}.title{font-size:14px;color:#ddd;font-weight:800;margin:0 0 10px}.btns{display:grid;gap:9px}.two{grid-template-columns:1fr 1fr}.three{grid-template-columns:1fr 1fr 1fr}.btn,label.upload{min-height:46px;border:1px solid #ffffff20;background:#0006;color:#fff;border-radius:18px;padding:11px;display:flex;align-items:center;justify-content:center;gap:8px;text-align:center;font-weight:800;cursor:pointer}.btn.active{background:#fff;color:#000;border-color:#fff}.btn.green{border-color:#6ee7b744;background:#6ee7b71a;color:#d1fae5}.btn.blue{border-color:#7dd3fc44;background:#7dd3fc1a;color:#e0f2fe}.viewer{position:relative;min-height:55dvh;background:radial-gradient(circle at top,#333,transparent 42%),linear-gradient(145deg,#050505,#121212);touch-action:none}.badge{position:absolute;left:14px;top:14px;z-index:2;border:1px solid #ffffff22;background:#0009;border-radius:22px;padding:10px 12px;backdrop-filter:blur(12px)}.zones{position:absolute;left:14px;right:14px;bottom:14px;z-index:3;display:flex;gap:8px;flex-wrap:wrap;border:1px solid #ffffff1f;background:#0009;border-radius:22px;padding:8px;backdrop-filter:blur(12px)}.zone{border:1px solid #ffffff18;background:#0009;border-radius:16px;padding:8px 10px;font-size:12px;font-weight:800;display:flex;align-items:center;gap:6px}.zone.active{background:#fff;color:#000}.dot{width:13px;height:13px;border-radius:999px;border:1px solid #0004}input.name{width:100%;background:#0008;color:#fff;border:1px solid #ffffff20;border-radius:16px;padding:12px;margin-bottom:10px;outline:none}input[type=color]{width:100%;height:56px;border:0;background:transparent;margin-bottom:12px}.layers{display:grid;gap:8px}.layer{display:flex;justify-content:space-between;gap:8px;background:#0007;border:1px solid #ffffff14;border-radius:16px;padding:10px;font-size:13px}.layer span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.muted{color:#777;font-size:12px}.hidden{display:none}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}.wide{grid-column:1/-1}.warn{border:1px solid #ef444455;background:#ef44441a;color:#fecaca;border-radius:20px;padding:12px;font-size:13px;line-height:1.35}@media(max-width:980px){.grid{grid-template-columns:1fr}.viewer{order:-1;height:56dvh}.left,.right{border:0;border-top:1px solid #ffffff18}.two{grid-template-columns:1fr 1fr}.three{grid-template-columns:repeat(3,minmax(88px,1fr));overflow:auto}}@media(max-width:520px){.top{align-items:flex-start}.pill{font-size:11px}.viewer{height:55dvh}.btn{font-size:13px;padding:9px}.three{grid-template-columns:repeat(3,100px)}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="importmap">
{"imports":{"react":"https://esm.sh/react@18.3.1","react-dom/client":"https://esm.sh/react-dom@18.3.1/client","three":"https://esm.sh/three@0.161.0","@react-three/fiber":"https://esm.sh/@react-three/fiber@8.17.10?deps=react@18.3.1,three@0.161.0","@react-three/drei":"https://esm.sh/@react-three/drei@9.122.0?deps=react@18.3.1,three@0.161.0,@react-three/fiber@8.17.10","three/addons/loaders/GLTFLoader.js":"https://esm.sh/three@0.161.0/examples/jsm/loaders/GLTFLoader.js"}}
</script>
<script type="module">
import React,{Suspense,useEffect,useMemo,useRef,useState}from'react';import{createRoot}from'react-dom/client';import{Canvas,useFrame}from'@react-three/fiber';import{OrbitControls,Environment,ContactShadows,Decal,Html}from'@react-three/drei';import*as THREE from'three';import{GLTFLoader}from'tree/addons/loaders/GLTFLoader.js'.replace('tree','three');
const templates=[{id:'runner',name:'Performance Runner',vibe:'fast / lightweight',scale:[2.9,.82,1.02],sole:[3.08,.25,1.12]},{id:'court',name:'Court Low',vibe:'clean / lifestyle',scale:[2.75,.9,1.05],sole:[2.95,.25,1.15]},{id:'high',name:'High Top',vibe:'basketball / street',scale:[2.65,1.32,1.02],sole:[2.95,.27,1.12]},{id:'boot',name:'Trail Boot',vibe:'rugged / outdoor',scale:[2.72,1.45,1.08],sole:[3.1,.34,1.18]}];
const zones=[['upper','Upper','#f4f0e8'],['sole','Midsole / Outsole','#171717'],['accent','Accent','#ff3b30'],['lining','Collar / Lining','#0f172a'],['laces','Laces','#fafafa']];
const mats={matte:{name:'Matte leather',roughness:.72,metalness:.02},gloss:{name:'Gloss patent',roughness:.18,metalness:.04},mesh:{name:'Sport mesh',roughness:.92,metalness:0},suede:{name:'Soft suede',roughness:.98,metalness:0}};
function mat(color,mode){return new THREE.MeshStandardMaterial({color,roughness:mode.roughness,metalness:mode.metalness})}
function GLBShoe({url,colors,mode}){const[scene,setScene]=useState(null),g=useRef();useEffect(()=>{if(!url)return;new GLTFLoader().load(url,gltf=>{const s=gltf.scene.clone(true);s.traverse(c=>{if(c.isMesh){c.castShadow=c.receiveShadow=true;let n=c.name.toLowerCase(),z=n.includes('sole')||n.includes('outsole')||n.includes('midsole')?'sole':n.includes('lace')?'laces':n.includes('lining')||n.includes('collar')?'lining':n.includes('accent')||n.includes('logo')||n.includes('swoosh')?'accent':'upper';c.material=mat(colors[z],mode)}});setScene(s)},undefined,()=>setScene(null))},[url,colors,mode]);useFrame((_,d)=>{if(g.current)g.current.rotation.y+=d*.02});return scene?<group ref={g} scale={1.8} position={[0,-.55,0]}><primitive object={scene}/></group>:<Html center>Loading real shoe model...</Html>}
function Shoe({template,colors,mode,decal,selected,demo}){const g=useRef();useFrame((_,d)=>{if(g.current)g.current.rotation.y+=d*.03});const M=z=>new THREE.MeshStandardMaterial({color:colors[z],roughness:mode.roughness,metalness:mode.metalness,emissive:selected===z?new THREE.Color(colors[z]).multiplyScalar(.1):new THREE.Color('#000')});return <group ref={g} position={[0,.1,0]}><mesh position={[0,.52,0]} scale={template.scale} castShadow receiveShadow><sphereGeometry args={[.5,96,48]}/><primitive object={M('upper')} attach='material'/>{decal&&<Decal position={[.62,.15,.49]} rotation={[0,0,0]} scale={[.58,.36,.58]} map={decal}/>}</mesh><mesh position={[.08,.05,0]} scale={template.sole} castShadow receiveShadow><boxGeometry args={[1,1,1]}/><primitive object={M('sole')} attach='material'/></mesh><mesh position={[-.72,.6,.51]} scale={[.62,.08,.065]} castShadow><boxGeometry args={[1,1,1]}/><primitive object={M('accent')} attach='material'/></mesh><mesh position={[-.14,.75,.49]} rotation={[.1,0,0]} scale={[1.02,.07,.05]} castShadow><boxGeometry args={[1,1,1]}/><primitive object={M('laces')} attach='material'/></mesh><mesh position={[-.62,.85,0]} scale={[.72,.2,.82]} castShadow><torusGeometry args={[.35,.05,20,64]}/><primitive object={M('lining')} attach='material'/></mesh>{demo&&<><mesh position={[.74,.57,.53]} scale={[.16,.16,.04]} castShadow><circleGeometry args={[1,64]}/><meshStandardMaterial color={colors.accent}/></mesh><mesh position={[.28,.32,.54]} rotation={[0,0,-.25]} scale={[.55,.045,.045]} castShadow><boxGeometry args={[1,1,1]}/><meshStandardMaterial color='#fff'/></mesh></>}</group>}
function App(){const[tid,setTid]=useState('runner'),[tool,setTool]=useState('paint'),[sel,setSel]=useState('upper'),[matId,setMat]=useState('matte'),[glb,setGlb]=useState(null),[decal,setDecal]=useState(null),[demo,setDemo]=useState(true),[name,setName]=useState('Untitled Colorway 001'),[status,setStatus]=useState('Ready'),[colors,setColors]=useState(Object.fromEntries(zones.map(z=>[z[0],z[2]]))),[layers,setLayers]=useState(['Base colorway','Demo art marks','3D shoe model']);const template=templates.find(t=>t.id===tid),mode=mats[matId];function upGLB(e){let f=e.target.files?.[0];if(!f)return;setGlb(URL.createObjectURL(f));setLayers(p=>[f.name,...p]);setStatus('Real GLB shoe loaded')}function upLogo(e){let f=e.target.files?.[0];if(!f)return;new THREE.TextureLoader().load(URL.createObjectURL(f),t=>{t.colorSpace=THREE.SRGBColorSpace;setDecal(t);setLayers(p=>['Logo: '+f.name,...p]);setTool('logo');setStatus('Logo placed')})}function save(){localStorage.setItem('shoelab-pro',JSON.stringify({name,tid,matId,colors,layers,date:new Date().toISOString()}));setStatus('Saved on phone')}function reset(){setColors(Object.fromEntries(zones.map(z=>[z[0],z[2]])));setGlb(null);setDecal(null);setDemo(true);setMat('matte');setSel('upper');setLayers(['Base colorway','Demo art marks','3D shoe model']);setStatus('Reset')}function exp(){let spec={app:'ShoeLab 3D Pro',name,shoe:template.name,material:mode.name,colorway:colors,layers,notes:['Use UV-unwrapped GLB shoe models for production artwork wrapping.','Name meshes upper, sole, laces, lining, accent for auto zone mapping.']};let b=new Blob([JSON.stringify(spec,null,2)],{type:'application/json'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download=name.replaceAll(' ','_')+'_spec.json';a.click();URL.revokeObjectURL(u);setStatus('Spec exported')}return <div className='app'><div className='top'><div><h1>ShoeLab 3D Pro</h1><div className='sub'>Phone-first custom footwear design studio</div></div><div className='pill'>✦ {status}</div></div><div className='grid'><aside className='panel left'><div className='card'><div className='title'>1. Shoe platform</div><input className='name' value={name} onChange={e=>setName(e.target.value)}/><div className='btns'>{templates.map(t=><button className={'btn '+(tid===t.id?'active':'')} onClick={()=>setTid(t.id)} key={t.id}><span>{t.name}<br/><small>{t.vibe}</small></span></button>)}</div><label className='upload green' style={{marginTop:10}}>Upload real .GLB shoe<input className='hidden' type='file' accept='.glb,.gltf' onChange={upGLB}/></label></div><div className='card'><div className='title'>2. Tool bench</div><div className='btns three'>{['paint','logo','shapes','text','material','style AI'].map(x=><button key={x} onClick={()=>setTool(x)} className={'btn '+(tool===x?'active':'')}>{x}</button>)}</div></div></aside><main className='viewer'><div className='badge'><small>LIVE 3D PREVIEW</small><br/><b>{glb?'Imported real model':template.name}</b></div><div className='zones'>{zones.map(z=><button key={z[0]} onClick={()=>setSel(z[0])} className={'zone '+(sel===z[0]?'active':'')}><span className='dot' style={{background:colors[z[0]]}}></span>{z[1]}</button>)}</div><Canvas camera={{position:[4.3,2.2,4.2],fov:42}} shadows gl={{preserveDrawingBuffer:true}}><ambientLight intensity={.68}/><directionalLight position={[4,5,3]} intensity={2.4} castShadow/><Suspense fallback={<Html center>Loading studio...</Html>}>{glb?<GLBShoe url={glb} colors={colors} mode={mode}/>:<Shoe template={template} colors={colors} mode={mode} decal={decal} selected={sel} demo={demo}/>}<Environment preset='studio'/><ContactShadows position={[0,-.08,0]} opacity={.5} scale={9} blur={2.8}/></Suspense><OrbitControls enablePan={false} minDistance={3} maxDistance={7}/></Canvas></main><aside className='panel right'><div className='card'><div className='title'>3. Selected zone: {zones.find(z=>z[0]===sel)?.[1]}</div><input type='color' value={colors[sel]} onChange={e=>{setColors(p=>({...p,[sel]:e.target.value}));setStatus('Color updated')}}/><div className='title'>Material finish</div><div className='btns two'>{Object.entries(mats).map(([id,m])=><button key={id} onClick={()=>setMat(id)} className={'btn '+(matId===id?'active':'')}>{m.name}</button>)}</div><label className='upload blue' style={{marginTop:10}}>Add logo / artwork<input className='hidden' type='file' accept='image/*' onChange={upLogo}/></label></div><div className='card'><div className='title'>4. Design layers</div><div className='layers'>{layers.map((l,i)=><div className='layer' key={l+i}><span>{l}</span><small>visible</small></div>)}</div><label className='muted' style={{marginTop:10,display:'flex',gap:8}}><input type='checkbox' checked={demo} onChange={e=>setDemo(e.target.checked)}/> Show demo art marks</label></div><div className='actions'><button className='btn' onClick={reset}>Reset</button><button className='btn active' onClick={save}>Save</button><button className='btn active wide' onClick={exp}>Export Design Spec</button></div><div className='warn' style={{marginTop:14}}>This is the upload-ready single-file build. Real production wraparound still requires UV-unwrapped GLB shoe models.</div></aside></div></div>}
createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
