<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>ShoeLab 3D | Artist Suite V6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/examples/jsm/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap');
        body { margin: 0; background: #121212; color: #fff; font-family: 'Roboto', sans-serif; overflow: hidden; }
        #canvas-container { width: 100vw; height: 45vh; background: #121212; position: relative; touch-action: none; }
        .ui-panel { height: 55vh; overflow-y: auto; padding: 20px; background: #1e1e1e; border-top: 1px solid #333; }
        .section-title { font-size: 11px; font-weight: 700; color: #9aa0a6; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
        .btn-google { background: #8ab4f8; color: #202124; font-weight: 700; padding: 12px; border-radius: 8px; transition: opacity 0.2s; font-size: 13px; border: none; width: 100%; }
        .btn-paint { background: #f28b82; color: #202124; font-weight: 900; padding: 16px; border-radius: 8px; font-size: 14px; border: none; width: 100%; margin-bottom: 10px; transition: all 0.2s; }
        .btn-paint.active { border: 2px solid #fff; box-shadow: 0 0 15px rgba(242,139,130,0.4); background: #e67c73; color: white; }
        input[type="color"] { -webkit-appearance: none; border: none; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 2px solid #555; border-radius: 50%; }
        .brush-cursor { cursor: crosshair !important; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div class="ui-panel">
        <div class="max-w-md mx-auto space-y-6">
            <header class="border-b border-gray-700 pb-3">
                <h1 class="text-xl font-bold text-gray-100">Artist Suite V6</h1>
                <p class="text-xs text-gray-400 text-blue-400">Tool 1: Direct Canvas Painting</p>
            </header>

            <section class="bg-gray-800 p-5 rounded-xl border border-gray-700">
                <div class="section-title text-red-400">Interactive Brush Engine</div>
                <button id="togglePaintBtn" class="btn-paint">ACTIVATE BRUSH MODE</button>
                
                <div class="flex justify-between items-center mt-4 bg-gray-900 p-3 rounded-lg">
                    <span class="text-xs font-bold text-gray-300 tracking-wider">BRUSH COLOR</span>
                    <input type="color" id="brushColor" value="#ea4335">
                </div>
                
                <div class="mt-4 bg-gray-900 p-3 rounded-lg">
                    <div class="flex justify-between text-xs font-bold text-gray-300 mb-2"><span>BRUSH SIZE</span><span id="brushSizeVal">10px</span></div>
                    <input type="range" id="brushSize" min="1" max="40" step="1" value="10" style="width:100%; accent-color:#f28b82;">
                </div>
            </section>

            <section class="bg-gray-800 p-4 rounded-xl opacity-40 pointer-events-none">
                <div class="section-title">Base Settings (Locked during V6 preview)</div>
                <button class="btn-google mb-4">IMPORT 3D MODEL (.GLB)</button>
            </section>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';

        let scene, camera, renderer, shoe, controls;
        let isPaintingMode = false;
        let isDrawing = false;
        
        const drawCanvas = document.createElement('canvas');
        drawCanvas.width = 1024;
        drawCanvas.height = 1024;
        const ctx = drawCanvas.getContext('2d', { willReadFrequently: true });
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, 1024, 1024);
        const canvasTexture = new THREE.CanvasTexture(drawCanvas);
        canvasTexture.colorSpace = THREE.SRGBColorSpace;
        
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / (window.innerHeight * 0.45), 0.1, 1000);
            camera.position.set(3, 1, 3);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight * 0.45);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            
            const container = document.getElementById('canvas-container');
            container.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1.2));
            const sun = new THREE.DirectionalLight(0xffffff, 1.5);
            sun.position.set(5, 10, 5);
            scene.add(sun);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            const loader = new GLTFLoader();
            loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/MaterialsVariantsShoe/glTF/MaterialsVariantsShoe.gltf', (gltf) => {
                shoe = gltf.scene;
                shoe.scale.set(10, 10, 10);
                shoe.position.y = -0.5;
                
                shoe.traverse((node) => {
                    if (node.isMesh) {
                        node.material = new THREE.MeshStandardMaterial({
                            map: canvasTexture,
                            roughness: 0.7,
                            side: THREE.DoubleSide
                        });
                    }
                });
                scene.add(shoe);
            });

            setupEvents(container);
            animate();
        }

        function paint(uv) {
            const color = document.getElementById('brushColor').value;
            const size = parseInt(document.getElementById('brushSize').value);
            const x = uv.x * drawCanvas.width;
            const y = (1 - uv.y) * drawCanvas.height;
            
            ctx.beginPath();
            ctx.arc(x, y, size, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
            canvasTexture.needsUpdate = true;
        }

        function handlePointer(e, container) {
            if (!isPaintingMode || !shoe) return;
            const rect = container.getBoundingClientRect();
            let clientX, clientY;
            
            if(e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }

            mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(shoe, true);
            
            if (intersects.length > 0 && intersects[0].uv) {
                paint(intersects[0].uv);
            }
        }

        function setupEvents(container) {
            const toggleBtn = document.getElementById('togglePaintBtn');
            toggleBtn.onclick = () => {
                isPaintingMode = !isPaintingMode;
                controls.enabled = !isPaintingMode; 
                toggleBtn.innerText = isPaintingMode ? "BRUSH ACTIVE: DRAW ON SHOE" : "ACTIVATE BRUSH MODE";
                toggleBtn.className = isPaintingMode ? "btn-paint active" : "btn-paint";
                container.className = isPaintingMode ? "brush-cursor" : "";
            };

            document.getElementById('brushSize').oninput = (e) => {
                document.getElementById('brushSizeVal').innerText = e.target.value + 'px';
            };

            const startDraw = (e) => { if(isPaintingMode) { isDrawing = true; handlePointer(e, container); } };
            const moveDraw = (e) => { if(isDrawing && isPaintingMode) handlePointer(e, container); };
            const endDraw = () => { isDrawing = false; };

            container.addEventListener('pointerdown', startDraw);
            container.addEventListener('pointermove', moveDraw);
            window.addEventListener('pointerup', endDraw);
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / (window.innerHeight * 0.45);
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight * 0.45);
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls.enabled) controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
